<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Volunteer Management | Smart Resource Allocation</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/pages/ngo-volunteers.css">
</head>
<body>
    <div class="app-container">
        <!-- SIDEBAR -->
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-top">
                <div class="logo">
                    <span class="logo-icon">🤝</span>
                    <span class="logo-text">SmartResource</span>
                </div>
                <div class="ngo-badge">
                    <span class="ngo-icon">🏢</span>
                    <span id="ngoNameText">Gavutham Foundation</span>
                </div>
            </div>
            <nav class="nav-links">
                <a href="ngo-dashboard.html" class="nav-link">🏠 Dashboard</a>
                <a href="ngo-volunteers.html" class="nav-link active">🙋 Volunteers</a>
                <a href="ngo-tasks.html" class="nav-link">✅ Task Management</a>
                <a href="ngo-community.html" class="nav-link">🌍 Community Needs</a>
                <a href="ngo-reports.html" class="nav-link">📊 Reports & Analytics</a>
                
                <a href="ngo-chatbox.html" class="nav-link">💬 Community Chatbox</a>
                <a href="ngo-profile.html" class="nav-link">⚙️ NGO Settings</a>
            </nav>
            <div class="sidebar-footer">
                <div class="user-profile-row" onclick="location.href='ngo-profile.html'">
                    <div class="sidebar-avatar" id="sidebarAvatar">G</div>
                    <div class="sidebar-user-details">
                        <span class="user-name" id="sidebarUserName">Gavutham</span>
                        <span class="user-role">🏢 NGO Admin</span>
                    </div>
                </div>
                <button class="btn-logout" onclick="handleLogout()">🚪 Logout</button>
            </div>
        </aside>

        <!-- MAIN CONTENT -->
        <main class="main-content">
            <header class="top-navbar">
                <div class="nav-left">
                    <button class="hamburger-btn">☰</button>
                    <h1 class="page-title">🙋 Volunteer Management</h1>
                </div>
                <div class="nav-right">
                    <button class="btn-outline" onclick="exportCSV()">⬇️ Export CSV</button>
                    <button class="btn-primary" onclick="openAddVolunteerModal()">➕ Add Volunteer</button>
                </div>
            </header>

            <div class="content-wrapper">
                <!-- STATS STRIP -->
                <section class="stats-strip">
                    <div class="stat-box">
                        <span class="label">Total Volunteers</span>
                        <span class="value" id="valTotal">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">Available</span>
                        <span class="value green" id="valAvailable">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">Busy</span>
                        <span class="value orange" id="valBusy">0</span>
                    </div>
                    <div class="stat-box">
                        <span class="label">On Leave</span>
                        <span class="value red" id="valOnLeave">0</span>
                    </div>
                </section>

                <!-- SEARCH + FILTER BAR -->
                <section class="filter-bar">
                    <div class="search-box">
                        <span class="search-icon">🔍</span>
                        <input type="text" id="searchInput" placeholder="Search by name, email, skill, or location..." oninput="debounceSearch()">
                    </div>
                    <div class="filters">
                        <select id="availFilter" onchange="fetchVolunteers()">
                            <option value="">All Status</option>
                            <option value="Available">Available</option>
                            <option value="Busy">Busy</option>
                            <option value="On Leave">On Leave</option>
                        </select>
                        <select id="skillFilter" onchange="fetchVolunteers()">
                            <option value="">All Skills</option>
                            <!-- Dynamic skills will be added here -->
                        </select>
                        <select id="sortFilter" onchange="fetchVolunteers()">
                            <option value="name">Name A-Z</option>
                            <option value="match_score">Match Score</option>
                            <option value="tasks">Most Tasks</option>
                        </select>
                        <div class="view-toggle">
                            <button class="toggle-btn active" id="viewModeGrid" onclick="setViewMode('grid')">▦</button>
                            <button class="toggle-btn" id="viewModeTable" onclick="setViewMode('table')">☰</button>
                        </div>
                    </div>
                </section>

                <!-- VOLUNTEER LIST -->
                <section id="volunteerContainer" class="volunteer-grid">
                    <!-- Cards will be injected here -->
                </section>

                <div id="pagination" class="pagination">
                    <!-- Pagination buttons -->
                </div>
            </div>
        </main>
    </div>

    <!-- DETAIL DRAWER -->
    <div id="detailDrawer" class="detail-drawer">
        <div class="drawer-header">
            <button class="close-drawer" onclick="closeDrawer()">&times;</button>
            <div class="drawer-profile" id="drawerProfile">
                <!-- Profile top injected here -->
            </div>
        </div>
        <div class="drawer-content" id="drawerContent">
            <!-- Content sections injected here -->
        </div>
        <div class="drawer-footer">
            <button class="btn-primary green" onclick="openAssignTaskModalFromDrawer()">📋 Assign Task</button>
            <button class="btn-outline">📊 Full Report</button>
        </div>
    </div>

    <!-- ADD VOLUNTEER MODAL -->
    <div id="addVolunteerModal" class="modal">
        <div class="modal-content large">
            <span class="close" onclick="closeModal('addVolunteerModal')">&times;</span>
            <h2>➕ Add New Volunteer</h2>
            <form id="addVolunteerForm" class="grid-form">
                <div class="form-row">
                    <div class="form-group">
                        <label>First Name</label>
                        <input type="text" name="first_name" required>
                    </div>
                    <div class="form-group">
                        <label>Last Name</label>
                        <input type="text" name="last_name" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" required>
                </div>
                <div class="form-row">
                    <div class="form-group">
                        <label>Phone Number</label>
                        <input type="text" name="phone_number" required>
                    </div>
                    <div class="form-group">
                        <label>Location</label>
                        <input type="text" name="location" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>Skills (comma separated)</label>
                    <input type="text" name="skills" placeholder="e.g. Doctor, Driving, First Aid">
                </div>
                <div class="form-group">
                    <label>Notes/Bio</label>
                    <textarea name="notes" rows="3"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-outline" onclick="closeModal('addVolunteerModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Create Volunteer</button>
                </div>
            </form>
        </div>
    </div>

    <!-- ASSIGN TASK MODAL -->
    <div id="assignTaskModal" class="modal">
        <div class="modal-content">
            <span class="close" onclick="closeModal('assignTaskModal')">&times;</span>
            <h2>📋 Assign Task</h2>
            <div id="assignTargetInfo" class="compact-profile"></div>
            <form id="assignTaskForm">
                <input type="hidden" id="assignVolunteerId">
                <div class="form-group">
                    <label>Select Task</label>
                    <select id="taskSelect" required>
                        <option value="">Choose an open task...</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Completion Deadline</label>
                    <input type="date" id="assignmentDeadline" required>
                </div>
                <div class="form-group">
                    <label>Special Instructions</label>
                    <textarea id="assignmentNotes" rows="3"></textarea>
                </div>
                <div class="modal-actions">
                    <button type="button" class="btn-outline" onclick="closeModal('assignTaskModal')">Cancel</button>
                    <button type="submit" class="btn-primary">Assign Now</button>
                </div>
            </form>
        </div>
    </div>

    <script src="../js/pages/ngo-volunteers.js"></script>
</body>
</html>
